name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly OpenSSF Scorecard security-posture run (#576). The scorecard job
    # below is schedule-gated, so it never runs — or blocks — on a PR.
    - cron: "0 4 * * 1"

    # Nightly mutation-testing run (PI-138/#563).
    - cron: "0 3 * * *"

  # Optimization: Only run CI when relevant files change
  # Uncomment and adjust paths as needed for your project

permissions:
  contents: read
  pull-requests: write

jobs:

  # PI-214: derive the test matrix from requires-python at runtime, so the
  # version floor can never drift from what the project itself declares (a
  # hardcoded matrix would reintroduce the PI-208 drift). This job reads
  # requires-python and emits every supported version that satisfies it;
  # lint-and-test then fans out across them. KNOWN is the only maintained
  # list — the *ceiling* set enumerated up to; bump it (or let Renovate) when
  # a new CPython is released. The floor is always taken from requires-python.
  python-matrix:
    name: Resolve Python matrix
    runs-on: ubuntu-24.04
    outputs:
      versions: ${{ steps.resolve.outputs.versions }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.7"

      - name: Resolve versions satisfying requires-python
        id: resolve
        run: |
          uv run --no-project --with packaging python - <<'PY'
          import json
          import os
          import pathlib
          import tomllib

          from packaging.specifiers import InvalidSpecifier, SpecifierSet

          # Maintained ceiling set — every CPython this template is willing to
          # test. The floor comes from requires-python (below), never from here.
          KNOWN = ["3.11", "3.12", "3.13", "3.14"]

          spec = ""
          pyproject = pathlib.Path("pyproject.toml")
          if pyproject.is_file():
              try:
                  data = tomllib.loads(pyproject.read_text(encoding="utf-8"))
                  spec = data.get("project", {}).get("requires-python", "") or ""
              except (tomllib.TOMLDecodeError, OSError):
                  spec = ""

          if spec:
              try:
                  allowed = SpecifierSet(spec)
                  versions = [v for v in KNOWN if allowed.contains(v + ".0")]
              except InvalidSpecifier:
                  # Present but malformed — fall back to the full set rather
                  # than failing the job on a bad requires-python.
                  versions = list(KNOWN)
          else:
              # No declared floor yet (e.g. a fresh scaffold) — test the full set.
              versions = list(KNOWN)
          if not versions:
              # requires-python excludes every KNOWN version — fall back to the
              # newest so CI still runs instead of erroring on an empty matrix.
              versions = [KNOWN[-1]]

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write("versions=" + json.dumps(versions) + "\n")
          print("requires-python:", spec or "(none) -> full KNOWN set")
          print("matrix:", versions)
          PY


  lint-and-test:
    name: Lint and test
    runs-on: ubuntu-24.04

    needs: python-matrix
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(needs.python-matrix.outputs.versions) }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6


      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.7"
          # Pin this job to the matrix version (PI-214). Not the PI-208 drift:
          # every matrix entry is >= the requires-python floor by construction
          # (see the python-matrix job), so the floor can't drift below what
          # the project declares.
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      # CI invokes the same justfile recipes agents and humans use (PI-139),
      # so the command surface is defined exactly once.
      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      # ShellCheck ships preinstalled on ubuntu-24.04 runners; shfmt does not.
      - name: Install shfmt
        run: |
          mkdir -p "$HOME/.local/bin"
          tmp="$(mktemp -d)"
          curl -sSfL https://github.com/mvdan/sh/releases/download/v3.8.0/shfmt_v3.8.0_linux_amd64 -o "$tmp/shfmt_v3.8.0_linux_amd64"
          # Verify the binary against the release's published checksums before
          # trusting it — no unverified curl|install of an executable.
          curl -sSfL https://github.com/mvdan/sh/releases/download/v3.8.0/sha256sums.txt -o "$tmp/sha256sums.txt"
          ( cd "$tmp" && grep 'shfmt_v3.8.0_linux_amd64$' sha256sums.txt | sha256sum -c - )
          chmod +x "$tmp/shfmt_v3.8.0_linux_amd64"
          mv "$tmp/shfmt_v3.8.0_linux_amd64" "$HOME/.local/bin/shfmt"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Sync dev dependencies
        run: just setup

      - name: Lint
        run: just lint

      - name: Typecheck
        run: just typecheck

      # Coverage gate (PI-138/PI-569): always on, not conditional — pytest-cov
      # is pulled in ephemerally via `uv run --with`, the same pattern mypy
      # (PI-558) and mutmut (PI-563) use, so there's no dev-dependency to
      # forget to add. Tune --cov-fail-under in the justfile's test-cov
      # recipe to your project's baseline; it no-ops on a fresh scaffold with
      # no src/ yet (same guard as typecheck).
      - name: Tests — parallel, coverage-gated
        run: just test-cov

      # Dependency vulnerability scan (PI-568). Complements package_guard.py,
      # which only blocks installing a package that doesn't exist or looks
      # typosquatted — this catches a real, correctly-spelled dependency
      # already in the lockfile with a known CVE/advisory.
      - name: Dependency vulnerability scan (pip-audit)
        run: just audit





      - name: Post failure summary
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          FAILED_STEPS=$(cat <<'SUMMARY'
          Lint or tests failed in this run. Check the details and fix before re-pushing.
          SUMMARY
          )
          gh pr comment "$PR_NUMBER" --body "## CI failed

          **Run:** $RUN_URL

          To see what failed:
          \`\`\`bash
          gh run view --log-failed
          \`\`\`

          Fix the issues, then run \`.claude/scripts/push_branch.sh\` to re-trigger CI."


  # Optimization #2: Split heavyweight tests into separate job
  # Only run integration/smoke tests after fast lint+unit tests pass
  # Adjust this job based on your actual integration test needs
  integration-tests:
    name: Integration tests
    runs-on: ubuntu-24.04
    needs: lint-and-test
    # Optional: Only run on main branch or when tests change significantly
    # if: github.ref == 'refs/heads/main' || contains(github.event.pull_request.files[*].name, 'tests/')
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.7"
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      # uv sync installs the project's required Python (.python-version /
      # requires-python) — no version to drift (PI-208).
      - name: Sync dev dependencies
        run: uv sync --group dev

      # Check if integration tests directory exists before running
      # This prevents masking real test failures with "No integration tests" message
      - name: Run integration tests
        run: |
          if [ -d tests/integration/ ]; then
            uv run pytest tests/integration/ -v --tb=short
          else
            echo "No integration tests directory found (tests/integration/)"
            echo "Create tests/integration/ when you have integration tests to run"
          fi

  # Test-quality verification via mutation testing (PI-138/#563). Mutmut is
  # slow, so it runs nightly (see the top-level `on: schedule` block), not
  # per-PR — non-blocking: not in ci-gate's `needs`, so a bad score never
  # blocks a merge. Promote it there once a real baseline is established.
  # `mutmut run` always exits 0 regardless of survivors; export-cicd-stats +
  # the score-gate step below turn the result into an actual pass/fail signal.
  # Requires a [tool.mutmut] section (source_paths = [...], scoped to
  # deterministic pure-logic modules — skip I/O-heavy code, hooks, template
  # renderers) in your own pyproject.toml; mutmut reads config from there,
  # not a standalone file like ruff.toml/mypy.ini.
  mutation-tests:
    name: Mutation tests (mutmut)
    runs-on: ubuntu-24.04
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.7"
      - run: uv sync --group dev
      - run: uv run --with mutmut mutmut run
      - run: uv run --with mutmut mutmut export-cicd-stats
      - name: Enforce mutation score gate (>= 80% killed)
        run: |
          python3 - <<'PY'
          import json
          import sys

          with open("mutants/mutmut-cicd-stats.json", encoding="utf-8") as f:
              stats = json.load(f)
          total = stats["total"]
          killed = stats["killed"]
          score = (killed / total * 100) if total else 100.0
          print(f"Mutation score: {score:.1f}% ({killed}/{total} killed)")
          if score < 80:
              sys.exit(f"Mutation score {score:.1f}% is below the 80% gate")
          PY


  


  # ADR-007: agent-agnostic secret-scanning backstop. The pre-commit git hook
  # gives fast local feedback but is fail-open; this job is the hard gate.
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          # Full history so leaked commits are caught, not just the latest diff
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3
        env:
          GITHUB_TOKEN: ${{ github.token }}
          # GITLEAKS_LICENSE is required only for organization-owned repos
          # (free key from gitleaks.io). Personal accounts need no license.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # Semgrep: semantic/AST security backstop. gitleaks (above) is string-
  # pattern secret scanning; semgrep catches unsafe subprocess calls, SQL
  # injection, and other OWASP Top 10 shapes gitleaks can't see. Explicit
  # rulesets (not --config=auto) for reproducibility. Not in ci-gate's
  # needs — a finding never blocks a merge while the false-positive rate is
  # calibrated, but --error still fails this job's own step so findings are
  # visible. Promote to ci-gate's needs once calibrated.
  semgrep:
    name: Semgrep (semantic security scan)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          # Full history: --baseline-commit (PR-only, below) needs the base
          # commit reachable, not just the latest diff.
          fetch-depth: 0

      - name: Run Semgrep
        env:
          SEMGREP_ENABLE_VERSION_CHECK: "0"
        run: |
          pip install --quiet semgrep==1.168.0
          RULESETS="--config p/secrets --config p/owasp-top-ten --config p/python"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Scan only the diff against the PR's base commit.
            semgrep scan --error --metrics=off $RULESETS \
              --baseline-commit "${{ github.event.pull_request.base.sha }}"
          else
            semgrep scan --error --metrics=off $RULESETS
          fi

  # Dependency license compliance (#579): flag copyleft (GPL/AGPL) dependencies
  # pulled in transitively — a permissive-licensed project (MIT/Apache-2.0)
  # usually must not ship them. Free/OSS tooling per language, no paid service,
  # runs entirely in CI. Non-blocking initially (NOT in ci-gate's needs) while
  # the deny-list is calibrated — the same rollout semgrep/scorecard used;
  # promote it into ci-gate once your license policy is settled. The deny-list
  # lives in the justfile's `license` recipe (or deny.toml for Rust).
  license-scan:
    name: Dependency license scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.7"

      - name: License scan (pip-licenses)
        run: just license



  # OpenSSF Scorecard (#576): standardized security-posture scoring (branch
  # protection, dependency pinning, SAST presence, token permissions, ...).
  # Schedule-only + non-blocking (NOT in ci-gate's needs) — a score is
  # informational, mirroring how semgrep/mutmut were introduced. It surfaces the
  # signal that most of the gates already shipped here would score well against.
  #
  # publish_results is FALSE by default: turning a scaffolded project's score
  # into a PUBLIC entry on the scorecard.dev dashboard is an explicit opt-in the
  # project owner must choose, never something the scaffolder silently enables.
  # To opt in, flip publish_results to true below (id-token: write is already
  # granted so the OIDC upload to the public dashboard works).
  scorecard:
    name: OpenSSF Scorecard
    runs-on: ubuntu-24.04
    if: github.event_name == 'schedule'
    permissions:
      security-events: write   # upload the SARIF result to code scanning
      id-token: write          # only needed if publish_results is turned on
      contents: read
      actions: read            # Scorecard reads workflow/branch-protection state
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # PUBLIC-dashboard publishing stays OFF by default (#576) — flip to
          # true only to deliberately publish this repo's score to scorecard.dev.
          publish_results: false

      # In-repo visibility: the score shows up under the Security → Code scanning
      # tab without ever leaving the repository.
      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@411c4c9a36b3fca4d674f06b6396b2c6d23522c6 # v3
        with:
          sarif_file: results.sarif

  # All-green gate (PI #555): the SINGLE required status check for branch
  # protection. Branch protection requires only "CI gate", so the required
  # context is robust to matrix changes — adding/removing a Python version
  # never renames the required check, and there is no un-expanded matrix name
  # (e.g. "Lint and test (3.11)") for GitHub to fail to match against, which is
  # what left main permanently `blocked` before. `if: always()` so the gate runs
  # even when an upstream job fails, then fails itself unless every dependency
  # succeeded.
  ci-gate:
    name: CI gate
    runs-on: ubuntu-24.04
    needs: [lint-and-test, secret-scan]
    if: always()
    steps:
      - name: Require all upstream jobs to succeed
        env:
          RESULTS: ${{ join(needs.*.result, ' ') }}
        run: |
          echo "Upstream job results: $RESULTS"
          for result in $RESULTS; do
            if [ "$result" != "success" ]; then
              echo "::error::A required job did not succeed (got: $result)."
              exit 1
            fi
          done
          echo "All required jobs passed."


# Optimization #3: Conditional job execution
# Example configurations for different scenarios (see full details in CLAUDE.md):
#
# Path filters: Only run CI when relevant files change
# Skip tests for docs-only changes: Use GitHub Actions conditional if statements
# Skip integration tests for PRs from forks: Use event filters
# See GitHub Actions documentation for complete conditionals syntax
