name: CI

# Compute jobs read `vars.CI_RUNS_ON` (PI-666): set the repo variable to
# `self-hosted` to run CI on your own runner — the escape hatch when a private
# repo exhausts its GitHub Actions minutes. Toggle with `just ci-local-on` /
# `ci-local-off`; setup guide: .agents/docs/guides/self-hosted-ci-runner.md.
# Secret/PAT-bearing workflows deliberately stay on GitHub-hosted ephemeral runners.
# Pinned here: board-automation, validate-pr, issue-validation, project-init-upgrade.


on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly OpenSSF Scorecard security-posture run (#576). The scorecard job
    # below is schedule-gated, so it never runs — or blocks — on a PR.
    - cron: "0 4 * * 1"
    # Nightly run: the `fuzz` job in every language, plus `mutation-tests` for
    # python (PI-138/#563). Each schedule-gated job below matches on its OWN
    # cron via `github.event.schedule` — `github.event_name == 'schedule'` alone
    # fires on EVERY cron here, which silently made `fuzz` weekly for node/go/
    # rust (where this nightly entry used to be absent) and made scorecard run
    # nightly for python (PR #736 review, Copilot + Codex).
    #
    # NOTE: a cron triggers the whole workflow. Ungated jobs (lint-and-test,
    # secret-scan, semgrep, license-scan, ci-gate) run on it too — see the
    # `fuzz` job's comment for how to restrict cron runs to gated jobs only.
    - cron: "0 3 * * *"
  # Optimization: Only run CI when relevant files change
  # Uncomment and adjust paths as needed for your project

permissions:
  contents: read
  pull-requests: write

# Cancel a superseded run when a new commit is pushed to the SAME pull request
# (PI-589) — review cycles re-push often, and finishing an obsolete run just
# burns runner-minutes. `cancel-in-progress` is gated to pull_request events, so
# scheduled (nightly fuzz/mutation, weekly scorecard) and main-push
# runs are NEVER cancelled — they always complete. `github.event_name` is in the
# group key so those non-PR runs don't share a group (they'd otherwise serialize:
# a long nightly on main would make a main push CI queue
# behind it).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:

  # PI-214: derive the test matrix from requires-python at runtime, so the
  # version floor can never drift from what the project itself declares (a
  # hardcoded matrix would reintroduce the PI-208 drift). This job reads
  # requires-python and emits every supported version that satisfies it;
  # lint-and-test then fans out across them. KNOWN is the only maintained
  # list — the *ceiling* set enumerated up to; bump it (or let Renovate) when
  # a new CPython is released. The floor is always taken from requires-python.
  python-matrix:
    name: Resolve Python matrix
    runs-on: ${{ vars.CI_RUNS_ON || 'ubuntu-24.04' }}
    outputs:
      versions: ${{ steps.resolve.outputs.versions }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.7"

      - name: Resolve versions satisfying requires-python
        id: resolve
        env:
          # Which cron fired (empty for push/pull_request). The resolver runs the
          # full matrix ONLY on the nightly cron — not the weekly Scorecard one.
          GITHUB_EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          uv run --no-project --with packaging python - <<'PY'
          import json
          import os
          import pathlib
          import tomllib

          from packaging.specifiers import InvalidSpecifier, SpecifierSet

          # Maintained ceiling set — every CPython this template is willing to
          # test. The floor comes from requires-python, else from the version
          # project-init pinned at scaffold time; never from here. Kept
          # byte-equal to SUPPORTED_PYTHON_VERSIONS in the scaffolder.
          KNOWN = ["3.11", "3.12", "3.13", "3.14"]

          def _key(v):
              return tuple(int(part) for part in v.split("."))

          spec = ""
          pyproject = pathlib.Path("pyproject.toml")
          if pyproject.is_file():
              try:
                  data = tomllib.loads(pyproject.read_text(encoding="utf-8"))
                  spec = data.get("project", {}).get("requires-python", "") or ""
              except (tomllib.TOMLDecodeError, OSError):
                  spec = ""

          if spec:
              try:
                  allowed = SpecifierSet(spec)
                  versions = [v for v in KNOWN if allowed.contains(v + ".0")]
              except InvalidSpecifier:
                  # Present but malformed — fall back to the full set rather
                  # than failing the job on a bad requires-python.
                  versions = list(KNOWN)
          else:
              # No requires-python yet (a fresh scaffold, #628) — honor the floor
              # project-init pinned into mise.toml and mypy.ini instead of fanning
              # out across CPythons the project never claimed to support.
              versions = [v for v in KNOWN if _key(v) >= _key("3.11")]
          if not versions:
              # requires-python excludes every KNOWN version — fall back to the
              # newest so CI still runs instead of erroring on an empty matrix.
              versions = [KNOWN[-1]]

          # Per-PR/push test only the FLOOR version for fast, cheap feedback
          # (PI-761). ONLY the nightly cron runs the full matrix — a version-
          # specific break is caught within a day. A cron triggers the whole
          # workflow, so gate on the specific schedule (github.event.schedule),
          # not event_name==schedule, or the WEEKLY Scorecard cron would fan out
          # too. "0 3 * * *" must match the nightly entry in `on.schedule` below;
          # test_ci_matrix_per_event asserts they agree.
          event = os.environ.get("GITHUB_EVENT_NAME", "")
          nightly = event == "schedule" and os.environ.get("GITHUB_EVENT_SCHEDULE", "") == "0 3 * * *"
          if not nightly and len(versions) > 1:
              versions = [min(versions, key=_key)]

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write("versions=" + json.dumps(versions) + "\n")
          print("requires-python:", spec or '(none) -> floor 3.11 from project-init')
          print("matrix:", versions)
          PY


  lint-and-test:
    name: Lint and test
    runs-on: ${{ vars.CI_RUNS_ON || 'ubuntu-24.04' }}

    needs: python-matrix
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(needs.python-matrix.outputs.versions) }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6


      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.7"
          # Pin this job to the matrix version (PI-214). Not the PI-208 drift:
          # every matrix entry is >= the requires-python floor by construction
          # (see the python-matrix job), so the floor can't drift below what
          # the project declares.
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      # CI invokes the same justfile recipes agents and humans use (PI-139),
      # so the command surface is defined exactly once.
      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      # ShellCheck ships preinstalled on ubuntu-24.04 runners; shfmt does not.
      - name: Install shfmt
        run: |
          mkdir -p "$HOME/.local/bin"
          tmp="$(mktemp -d)"
          curl -sSfL https://github.com/mvdan/sh/releases/download/v3.8.0/shfmt_v3.8.0_linux_amd64 -o "$tmp/shfmt_v3.8.0_linux_amd64"
          # Verify the binary against the release's published checksums before
          # trusting it — no unverified curl|install of an executable.
          curl -sSfL https://github.com/mvdan/sh/releases/download/v3.8.0/sha256sums.txt -o "$tmp/sha256sums.txt"
          ( cd "$tmp" && grep 'shfmt_v3.8.0_linux_amd64$' sha256sums.txt | sha256sum -c - )
          chmod +x "$tmp/shfmt_v3.8.0_linux_amd64"
          mv "$tmp/shfmt_v3.8.0_linux_amd64" "$HOME/.local/bin/shfmt"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Sync dev dependencies
        run: just setup

      - name: Lint
        run: just lint

      - name: Typecheck
        run: just typecheck

      # PI-686: CODE_MAP.md's header tells agents to "read this before grepping",
      # but nothing checked it was current — the generator shipped wired only to
      # a manual `just code-map`, so the map rotted silently and agents were
      # routed to a stale index. Regenerate into a temp dir (gen_code_map.py
      # writes .agents/docs/CODE_MAP.md relative to cwd) and compare bytes;
      # never rewrite the committed file in CI. Skips cleanly before the first
      # `just code-map` run, so a fresh scaffold is not born red.
      - name: CODE_MAP is current
        run: |
          set -euo pipefail
          map=".agents/docs/CODE_MAP.md"
          gen=".agents/scripts/gen_code_map.py"
          # A python scaffold always ships the generator, so its absence is a
          # broken scaffold, not a not-yet-generated map — fail rather than
          # silently pass a check that can never run (PR #724 review).
          if [ ! -f "$gen" ]; then
            echo "::error file=$gen::missing — the CODE_MAP staleness check cannot run"
            exit 1
          fi
          if [ ! -f "$map" ]; then
            echo "no $map yet — generate it with 'just code-map' and commit."
            exit 0
          fi
          scan="src"
          [ -d "$scan" ] || scan="."
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          ( cd "$tmp" && uv run --no-project python \
              "$GITHUB_WORKSPACE/$gen" "$GITHUB_WORKSPACE/$scan" >/dev/null )
          if ! cmp -s "$tmp/$map" "$map"; then
            echo "::error file=$map::CODE_MAP.md is stale — run 'just code-map' and commit"
            diff -u "$map" "$tmp/$map" | head -n 40 || true
            exit 1
          fi
          echo "$map is current."

      # Coverage gate (PI-138/PI-569): always on, not conditional — pytest-cov
      # is pulled in ephemerally via `uv run --with`, the same pattern mypy
      # (PI-558) and mutmut (PI-563) use, so there's no dev-dependency to
      # forget to add. Tune --cov-fail-under in the justfile's test-cov
      # recipe to your project's baseline; it no-ops on a fresh scaffold with
      # no src/ yet (same guard as typecheck).
      - name: Tests — parallel, coverage-gated
        run: just test-cov

      # Dependency vulnerability scan (PI-568). Complements package_guard.py,
      # which only blocks installing a package that doesn't exist or looks
      # typosquatted — this catches a real, correctly-spelled dependency
      # already in the lockfile with a known CVE/advisory.
      - name: Dependency vulnerability scan (pip-audit)
        run: just audit





      - name: Post failure summary
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          FAILED_STEPS=$(cat <<'SUMMARY'
          Lint or tests failed in this run. Check the details and fix before re-pushing.
          SUMMARY
          )
          gh pr comment "$PR_NUMBER" --body "## CI failed

          **Run:** $RUN_URL

          To see what failed:
          \`\`\`bash
          gh run view --log-failed
          \`\`\`

          Fix the issues, then run \`.agents/scripts/push_branch.sh\` to re-trigger CI."


  # Optimization #2: Split heavyweight tests into separate job
  # Only run integration/smoke tests after fast lint+unit tests pass
  # Adjust this job based on your actual integration test needs.
  # Non-blocking (NOT in ci-gate's needs) — add it there once your
  # integration suite is stable enough to gate merges.
  integration-tests:
    name: Integration tests
    runs-on: ${{ vars.CI_RUNS_ON || 'ubuntu-24.04' }}
    needs: lint-and-test
    # Optional: Only run on main branch or when tests change significantly
    # if: github.ref == 'refs/heads/main' || contains(github.event.pull_request.files[*].name, 'tests/')
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.7"
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      # uv sync installs the project's required Python (.python-version /
      # requires-python) — no version to drift (PI-208). A fresh scaffold has
      # no pyproject.toml yet — skip the sync instead of failing (same guard
      # as the justfile's `setup` recipe).
      - name: Sync dev dependencies
        run: |
          if [ ! -f pyproject.toml ]; then
            echo "No pyproject.toml yet — nothing to sync."
          elif grep -q "^\[dependency-groups\]" pyproject.toml; then
            uv sync --group dev
          else
            uv sync
          fi

      # Check if integration tests directory exists before running
      # This prevents masking real test failures with "No integration tests" message
      - name: Run integration tests
        run: |
          if [ -d tests/integration/ ]; then
            uv run pytest tests/integration/ -v --tb=short
          else
            echo "No integration tests directory found (tests/integration/)"
            echo "Create tests/integration/ when you have integration tests to run"
          fi

  # Test-quality verification via mutation testing (PI-138/#563). Mutmut is
  # slow, so it runs nightly (see the top-level `on: schedule` block), not
  # per-PR — non-blocking: not in ci-gate's `needs`, so a bad score never
  # blocks a merge. Promote it there once a real baseline is established.
  # `mutmut run` always exits 0 regardless of survivors; export-cicd-stats +
  # the score-gate step below turn the result into an actual pass/fail signal.
  # Requires a [tool.mutmut] section (source_paths = [...], scoped to
  # deterministic pure-logic modules — skip I/O-heavy code, hooks, template
  # renderers) in your own pyproject.toml; mutmut reads config from there,
  # not a standalone file like ruff.toml/mypy.ini.
  mutation-tests:
    name: Mutation tests (mutmut)
    runs-on: ${{ vars.CI_RUNS_ON || 'ubuntu-24.04' }}
    # Nightly cron only — not the weekly Scorecard one (see `on.schedule`).
    if: github.event_name == 'schedule' && github.event.schedule == '0 3 * * *'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.7"
      # Mutmut needs a pyproject.toml (its [tool.mutmut] config lives there);
      # a fresh scaffold ships none — skip the nightly run instead of failing.
      - name: Check for pyproject.toml
        id: pyproject
        run: |
          if [ -f pyproject.toml ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No pyproject.toml yet — skipping mutation tests."
          fi
      - if: steps.pyproject.outputs.exists == 'true'
        run: uv sync --group dev
      - if: steps.pyproject.outputs.exists == 'true'
        run: uv run --with mutmut mutmut run
      - if: steps.pyproject.outputs.exists == 'true'
        run: uv run --with mutmut mutmut export-cicd-stats
      # The gate lives in a script, not a heredoc, because a gate that cannot be
      # tested is a gate that cannot be trusted — and this one had exactly the
      # defect it exists to detect (#132): it scored an empty run as 100% and
      # passed, nightly, in silence. Its behaviour is now pinned by
      # tests/test_mutation_gate.py, which runs in the ordinary suite.
      #
      # --floor is a RATCHET. Raise it when the score rises; never lower it to turn
      # a red build green. 100% is not the target and never will be: some mutants
      # are *equivalent*, changing the code without changing the behaviour under
      # test. `_fence` in briefing.py is the honest example — every surviving
      # mutant there makes the fence LONGER, which still contains the untrusted
      # output, so the tests are right not to fail. Demanding 100% only teaches
      # people to pin implementation details in tests, which is worse than the
      # disease.
      - name: Enforce mutation score gate
        if: steps.pyproject.outputs.exists == 'true'
        run: python3 .agents/scripts/mutation_gate.py --floor 60


  


  # ADR-007: agent-agnostic secret-scanning backstop. The pre-commit git hook
  # gives fast local feedback but is fail-open; this job is the hard gate.
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ${{ vars.CI_RUNS_ON || 'ubuntu-24.04' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          # Full history so leaked commits are caught, not just the latest diff
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3
        env:
          GITHUB_TOKEN: ${{ github.token }}
          # GITLEAKS_LICENSE is required only for organization-owned repos
          # (free key from gitleaks.io). Personal accounts need no license.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # Semgrep: semantic/AST security backstop. gitleaks (above) is string-
  # pattern secret scanning; semgrep catches unsafe subprocess calls, SQL
  # injection, and other OWASP Top 10 shapes gitleaks can't see. Explicit
  # rulesets (not --config=auto) for reproducibility. Not in ci-gate's
  # needs — a finding never blocks a merge while the false-positive rate is
  # calibrated, but --error still fails this job's own step so findings are
  # visible. Promote to ci-gate's needs once calibrated.
  semgrep:
    name: Semgrep (semantic security scan)
    runs-on: ${{ vars.CI_RUNS_ON || 'ubuntu-24.04' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          # Full history: --baseline-commit (PR-only, below) needs the base
          # commit reachable, not just the latest diff.
          fetch-depth: 0

      # uvx (not bare `pip`): a self-hosted runner has no writable system
      # site-packages, so `pip install semgrep` fails there (externally-managed
      # env). uvx runs it from an ephemeral, pinned env on hosted and
      # self-hosted alike (CI_RUNS_ON switch, PI-666/PI-673).
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.7"

      - name: Run Semgrep
        env:
          SEMGREP_ENABLE_VERSION_CHECK: "0"
        run: |
          SEMGREP="uvx semgrep@1.168.0"
          RULESETS="--config p/secrets --config p/owasp-top-ten --config p/python"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Scan only the diff against the PR's base commit.
            $SEMGREP scan --error --metrics=off $RULESETS \
              --baseline-commit "${{ github.event.pull_request.base.sha }}"
          else
            $SEMGREP scan --error --metrics=off $RULESETS
          fi

  # Dependency license compliance (#579): flag copyleft (GPL/AGPL) dependencies
  # pulled in transitively — a permissive-licensed project (MIT/Apache-2.0)
  # usually must not ship them. Free/OSS tooling per language, no paid service,
  # runs entirely in CI. Non-blocking initially (NOT in ci-gate's needs) while
  # the deny-list is calibrated — the same rollout semgrep/scorecard used;
  # promote it into ci-gate once your license policy is settled. The deny-list
  # lives in the justfile's `license` recipe (or deny.toml for Rust).
  license-scan:
    name: Dependency license scan
    runs-on: ${{ vars.CI_RUNS_ON || 'ubuntu-24.04' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.7"

      - name: License scan (pip-licenses)
        run: just license

  # Property-based testing / fuzzing (#580, #727). `just fuzz` exists in every
  # language, so it runs in CI in every language — previously only Go had a job,
  # and the other three shipped a recipe nothing ever invoked: dead surface that
  # reads as covered.
  #
  # WHY NIGHTLY, NOT PER-PR (#727). Fuzzing is a pattern for surfacing edge
  # cases, not a uniform gate like ruff or coverage. Per-PR it would tax every
  # push for near-zero value on a fresh scaffold. Nightly is also where it earns
  # its keep: Hypothesis, proptest and fast-check draw FRESH random seeds each
  # run, so a nightly job explores inputs a per-PR run would only repeat. (Go's
  # `go test -run=Fuzz` is a deterministic seed-corpus replay, so it gains
  # nothing from repetition — but uniformity across the four languages is worth
  # more than one job placed differently.) This is the same rollout mutation
  # testing already uses: schedule-gated, non-blocking, promote when you have a
  # baseline worth gating on.
  #
  # Non-blocking: NOT in ci-gate's `needs`. To gate on it, add a `-fuzztime`
  # active-fuzzing step and promote it there deliberately.
  #
  # Only one language renders per scaffold, so exactly one `fuzz` job exists.
  #
  # COST, STATED HONESTLY (PR #736 review). A cron entry triggers the WHOLE
  # workflow, not just the jobs gated on it. The nightly cron therefore also runs
  # every ungated job — `lint-and-test`, `secret-scan`, `semgrep`, `license-scan`
  # — plus `ci-gate`. Python scaffolds have behaved this way since the nightly
  # mutmut cron landed (#563); #727 extends the same nightly run to node/go/rust.
  # To make cron runs execute ONLY the schedule-gated jobs, add
  # `if: github.event_name != 'schedule'` to each ungated job AND to `ci-gate`
  # — `ci-gate` is `if: always()` and treats a skipped `needs` job as a failure,
  # so gating the others without gating it turns every nightly run red.
  #
  # The `if:` matches the NIGHTLY cron specifically. `github.event_name ==
  # 'schedule'` alone fires on every cron in `on.schedule`, which would make
  # this job weekly-and-nightly and (worse) couple unrelated jobs' cadences.
  fuzz:
    name: Fuzz / property tests
    runs-on: ${{ vars.CI_RUNS_ON || 'ubuntu-24.04' }}
    # Nightly cron only — not the weekly Scorecard one (see `on.schedule`).
    if: github.event_name == 'schedule' && github.event.schedule == '0 3 * * *'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      # A fresh scaffold ships no manifest. Skip rather than fail: a nightly run
      # that is red from day one is a notification people learn to ignore. Only
      # one language renders per scaffold, so testing all four names needs no
      # per-language variable.
      - name: Check for a project manifest
        id: manifest
        run: |
          if [ -f pyproject.toml ] || [ -f package.json ] || [ -f go.mod ] || [ -f Cargo.toml ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No project manifest yet — nothing to fuzz."
          fi

      - name: Install uv
        if: steps.manifest.outputs.exists == 'true'
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.7"
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Run property/fuzz tests
        if: steps.manifest.outputs.exists == 'true'
        run: just fuzz

  # OpenSSF Scorecard (#576): standardized security-posture scoring (branch
  # protection, dependency pinning, SAST presence, token permissions, ...).
  # Schedule-only + non-blocking (NOT in ci-gate's needs) — a score is
  # informational, mirroring how semgrep/mutmut were introduced. It surfaces the
  # signal that most of the gates already shipped here would score well against.
  #
  # publish_results is FALSE by default: turning a scaffolded project's score
  # into a PUBLIC entry on the scorecard.dev dashboard is an explicit opt-in the
  # project owner must choose, never something the scaffolder silently enables.
  # To opt in, flip publish_results to true below (id-token: write is already
  # granted so the OIDC upload to the public dashboard works).
  scorecard:
    name: OpenSSF Scorecard
    runs-on: ubuntu-24.04  # pinned: OSSF scorecard-action requires GitHub-hosted runners
    # Weekly cron only — not the nightly one (see `on.schedule`).
    if: github.event_name == 'schedule' && github.event.schedule == '0 4 * * 1'
    permissions:
      security-events: write   # upload the SARIF result to code scanning
      id-token: write          # only needed if publish_results is turned on
      contents: read
      actions: read            # Scorecard reads workflow/branch-protection state
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      # Full version pin: ossf/scorecard-action publishes no floating `v2`
      # major tag (only exact vX.Y.Z tags), so `@v2` fails to resolve.
      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # PUBLIC-dashboard publishing stays OFF by default (#576) — flip to
          # true only to deliberately publish this repo's score to scorecard.dev.
          publish_results: false

      # In-repo visibility: the score shows up under the Security → Code scanning
      # tab without ever leaving the repository.
      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@411c4c9a36b3fca4d674f06b6396b2c6d23522c6 # v3
        with:
          sarif_file: results.sarif

  # All-green gate (PI #555): the SINGLE required status check for branch
  # protection. Branch protection requires only "CI gate", so the required
  # context is robust to matrix changes — adding/removing a Python version
  # never renames the required check, and there is no un-expanded matrix name
  # (e.g. "Lint and test (3.11)") for GitHub to fail to match against, which is
  # what left main permanently `blocked` before. `if: always()` so the gate runs
  # even when an upstream job fails, then fails itself unless every dependency
  # succeeded.
  # The governance job (when the overlay is on) is in the gate's needs: its
  # comment calls it "the enforcement boundary", which is only true if a
  # failing gate actually blocks the merge.
  ci-gate:
    name: CI gate
    runs-on: ${{ vars.CI_RUNS_ON || 'ubuntu-24.04' }}  # must follow the variable: it is the REQUIRED check — pinned, it can't start during a billing lockout and blocks the merge
    needs: [lint-and-test, secret-scan]
    if: always()
    steps:
      - name: Require all upstream jobs to succeed
        env:
          RESULTS: ${{ join(needs.*.result, ' ') }}
        run: |
          echo "Upstream job results: $RESULTS"
          for result in $RESULTS; do
            if [ "$result" != "success" ]; then
              echo "::error::A required job did not succeed (got: $result)."
              exit 1
            fi
          done
          echo "All required jobs passed."


# Optimization #3: Conditional job execution
# Example configurations for different scenarios (see full details in CLAUDE.md):
#
# Path filters: Only run CI when relevant files change
# Skip tests for docs-only changes: Use GitHub Actions conditional if statements
# Skip integration tests for PRs from forks: Use event filters
# See GitHub Actions documentation for complete conditionals syntax
