name: Validate issue metadata

on:
  issues:
    types: [opened, edited, reopened, labeled, unlabeled]

permissions:
  issues: write

jobs:
  validate-issue:
    runs-on: ubuntu-24.04
    steps:
      - name: Validate required planning metadata
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          LABELS_JSON: ${{ toJson(github.event.issue.labels) }}
        run: |
          set -euo pipefail

          missing=()

          has_body_value() {
            local name="$1"
            local bullet_pattern="^- ${name}: (unset|[[:space:]]*)$"
            if ! printf '%s\n' "$ISSUE_BODY" | grep -qiE "$name"; then
              missing+=("$name")
              return
            fi
            if printf '%s\n' "$ISSUE_BODY" | grep -qiE "$bullet_pattern"; then
              missing+=("$name")
            fi
          }

          # Map a body "Type" value (either the create_issue.sh type keyword —
          # feat/fix/chore/docs/test — or the label name itself) to the canonical
          # type label.
          map_type_label() {
            case "$(printf '%s' "$1" | tr '[:upper:]' '[:lower:]')" in
            feat | feature) echo "feature" ;;
            fix | bug) echo "bug" ;;
            chore) echo "chore" ;;
            docs | documentation) echo "documentation" ;;
            test) echo "test" ;;
            *) echo "" ;;
            esac
          }

          # Derive the type from the body, tolerating both the "- Type: value"
          # bullet (create_issue.sh / MCP-API issues) and the "### Type" heading
          # block (issue forms).
          parse_type_from_body() {
            local body="$1" val
            val=$(printf '%s\n' "$body" | sed -n 's/^[[:space:]]*-[[:space:]]*Type:[[:space:]]*//Ip' | head -1 | sed 's/[[:space:]]*$//')
            if [ -z "$val" ]; then
              val=$(printf '%s\n' "$body" | awk '
                BEGIN { in_s = 0 }
                /^[[:space:]]*###[[:space:]]+Type[[:space:]]*$/ { in_s = 1; next }
                in_s && /^[[:space:]]*$/ { next }
                in_s { sub(/[[:space:]]*$/, ""); print; exit }
              ')
            fi
            printf '%s\n' "$val"
          }

          # Issues created via the GitHub MCP/API can't create labels or set them,
          # so they land with no valid type label. Derive the type from the body's
          # "- Type:" (or "### Type"), create the mapped label if missing, and apply
          # it (this job already has issues: write). Only fall back to flagging
          # "type label" as missing when the body carries no recognizable type.
          has_type_label() {
            if printf '%s\n' "$LABELS_JSON" | jq -e 'any(.[].name; . == "feature" or . == "bug" or . == "chore" or . == "documentation" or . == "test")' >/dev/null; then
              return
            fi
            local body_type label
            body_type=$(parse_type_from_body "$ISSUE_BODY")
            label=$(map_type_label "$body_type")
            if [ -z "$label" ]; then
              missing+=("type label")
              return
            fi
            gh label create "$label" --color "0075ca" --description "Issue type" 2>/dev/null || true
            if gh issue edit "$ISSUE_NUMBER" --add-label "$label"; then
              echo "Applied type label '$label' (derived from body Type '$body_type')."
            else
              missing+=("type label")
            fi
          }

          # Dual-format body field reader (bullet "- Field: value" wins, else the
          # "### Field" heading block) — the same parser board-automation.yml uses.
          parse_body_field() {
            local heading="$1" body="$2" val
            val=$(printf '%s\n' "$body" \
              | sed -n "s/^[[:space:]]*-[[:space:]]*${heading}:[[:space:]]*//Ip" \
              | head -1 | sed 's/[[:space:]]*$//')
            if [ -n "$val" ]; then
              printf '%s\n' "$val"
              return 0
            fi
            printf '%s\n' "$body" | awk -v h="$heading" '
              BEGIN { in_section = 0 }
              $0 ~ "^[[:space:]]*###[[:space:]]+" h "[[:space:]]*$" { in_section = 1; next }
              in_section && /^[[:space:]]*$/ { next }
              in_section { sub(/[[:space:]]*$/, ""); print; exit }
            '
          }

          # Turn the body's free-text Area value into facetable area:<slug>
          # label(s) so issues are filterable by subsystem in the UI, mirroring the
          # type-label derivation above. Comma-separated areas each get a label.
          # Best-effort and non-blocking — the Area *value* is already required by
          # has_body_value "Area"; this only adds the click-to-filter convenience.
          apply_area_labels() {
            local raw slug
            raw=$(parse_body_field "Area" "$ISSUE_BODY")
            case "$(printf '%s' "$raw" | tr '[:upper:]' '[:lower:]')" in
            "" | unset) return ;;
            esac
            printf '%s\n' "$raw" | tr ',' '\n' | while IFS= read -r part; do
              slug=$(printf '%s' "$part" | tr '[:upper:]' '[:lower:]' \
                | sed 's/[^a-z0-9]\{1,\}/-/g; s/^-//; s/-$//')
              [ -z "$slug" ] && continue
              gh label create "area:$slug" --color "1d76db" --description "Affected area / component" 2>/dev/null || true
              gh issue edit "$ISSUE_NUMBER" --add-label "area:$slug" >/dev/null 2>&1 \
                && echo "Applied area label 'area:$slug'."
            done
          }

          has_body_value "Priority"
          has_body_value "Area"
          has_body_value "Size"
          has_body_value "References"
          has_body_value "Dependencies"
          has_body_value "Acceptance criteria"
          has_body_value "Definition of Ready"
          has_body_value "Agent ready"
          has_body_value "Confidence"
          has_body_value "Definition of Done"
          has_type_label
          apply_area_labels

          if [ "${#missing[@]}" -gt 0 ]; then
            gh label create "status:needs-info" --color "d93f0b" --description "Issue is missing required planning metadata" 2>/dev/null || true
            gh issue edit "$ISSUE_NUMBER" --add-label "status:needs-info" || true
            {
              echo "This issue is missing required planning metadata:"
              echo
              for item in "${missing[@]}"; do
                echo "- $item"
              done
              echo
              echo "Update the issue body, then the status:needs-info label will be removed automatically."
            } > /tmp/issue-validation-comment.md
            gh issue comment "$ISSUE_NUMBER" --body-file /tmp/issue-validation-comment.md
            exit 1
          fi

          gh issue edit "$ISSUE_NUMBER" --remove-label "status:needs-info" || true
          echo "Issue metadata is complete."
