# gitleaks config — extends the built-in default ruleset and adds a narrow
# allowlist for the scaffold record this project generates.
# Used by the CI "Secret scan (gitleaks)" job (gitleaks-action@v3).
#
# Without this file a fresh scaffold fails its first CI run: project-init writes
# a `manifest:` map of relpath → sha256 into .agents/config.yaml, and the
# high-entropy hash next to a "secrets.md" path key trips the default
# generic-api-key rule. Those are content hashes, not secrets (PI #554).

[extend]
useDefault = true

[allowlist]
description = "project-init scaffold record (content hashes, not secrets)."
# Deliberately NARROW: allowlist only the specific generated file whose content
# hashes trip the default rules (.agents/config.yaml, PI-554). We do NOT
# allowlist whole example/config templates by path — that would create a blind
# spot where a real credential later committed to a `.env.example` / `*.example.*`
# file goes unscanned by both the pre-commit and CI gitleaks gates. Those example
# files ship empty or "$VAR" placeholders that don't trip the default ruleset
# anyway (verified against the governance + multi-model overlays), so no
# example-path exemption is needed.
paths = [
  '''\.agents/config\.yaml''',
]
