# project-init: record of choices made at init time.
# Safe to hand-edit; re-running `project-init` will reconcile with this file.

project:
  name: "demo-service"
  description: "golden fixture for the orchestrator contract test"
  created: "2026-07-12"
  project_init_version: 1.0.1
  project_init_contract_version: 2  # descriptor-contract schema a root orchestrator reads (#498, ADR-025); absent ⇒ v0
  project_init_plugin_version: 0.2.1  # plugin payload version (ADR-010)
  profile: individual     # individual | standalone | org — distribution profile (ADR-013)
  enforcement: advisory      # advisory | hard — see ADR-013 / #251
  project_init_host: github.com  # upstream GitHub host (github.com | *.ghe.com | GHES) — #255/#259
  project_key: ""          # e.g. "PI" → branches use feat/PI-42-slug, PR titles use feat(PI-42):
  github_project_number: 1 # numeric GitHub Project V2 board number — single source of truth read by board-automation.yml, create_issue.sh, and setup_github.sh (#556)

language: python            # python | node | go | none

delivery: service            # library | service | prototype — how this ships (ADR-015)
deploy:
  target: cloud-run
  app: "demo-service"
  region: us-central1
  health_url: ""
iac: none            # none | opentofu — infrastructure-as-code overlay (ADR-015)

memory:
  # Stable descriptor (#498): tier + resolved paths a root orchestrator reads to
  # introspect this project. Anchors (memory_path, MEMORY.md) are invariant across
  # tiers; higher tiers only ADD retrieval surfaces (vault, graph).
  tier: 0             # 0 auto | 1 obsidian-only | 2 obsidian-graphify | 3 obsidian-graphify-rag
  stack: auto
  memory_path: .agents/memory

mcps:
  installed: []

safety:
  # prod_guard escape hatch: JSON list of regex patterns for commands the
  # destructive-operation guard should never flag (e.g. a dev-cluster
  # kubectl context). Keep it narrow.
  allow: []

tooling:
  lint_command: "uv run ruff check ."
  format_command: "uv run ruff format ."
  test_command: "uv run pytest"
  run_command: "uv run python -m demo-service"

observability:
  path: .agents/observability

hooks:
  expected: [pre-commit, commit-msg, pre-push]


# Extra files never overwritten or reported as drift on `upgrade` (and on
# `project-init` re-runs) (#243): a single-line JSON array of globs.
# memory/ are always preserved.
# preserve: ["ci.yml", "justfile", "docs/*.md"]

updates:
  # Addition-group consent state (#249): IDs the owner has declined are stored
  # here and suppressed on future `upgrade --apply` unless the upstream addition
  # changes materially. Populated by `--decline-new`; empty by default.
  declined_additions: {}

